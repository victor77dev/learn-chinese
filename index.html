</div>

    </div>
  </div>

    建议每次最多 8 个词，生成需要几秒钟。
  </div>

];

const AUTO_EMOJI=["📖","🌟","🎈","🍀","🌈","🎀","🚀","🐣","🌻","🦋"];
let THEMES={
  "情绪":EMOTION_WORDS.map(w=>({...w,builtin:true})),
  "课程":COURSE_WORDS.map(w=>({...w,builtin:true}))
};
let curTheme="情绪",cur=0;
let mediaRecorder=null,chunks=[],isRec=false;
let quizWriters=[],demoWriters=[],quizDone=[];
let starsEarned={};
let strokePlaying=false;

const STORAGE_KEY='kids-vocab-themes-v3';
async function loadSaved(){
  try{
    if(window.storage){
      const r=await window.storage.get(STORAGE_KEY);
      if(r&&r.value){
        const saved=JSON.parse(r.value);
        Object.keys(saved).forEach(t=>{
          if(!THEMES[t])THEMES[t]=[];
          saved[t].forEach(w=>{if(!THEMES[t].some(x=>x.zh===w.zh))THEMES[t].push(w);});
        });
        themeNav();wordNav();
      }
    }
  }catch(e){}
}
async function persist(){
  try{
    if(window.storage){
      const custom={};
      Object.keys(THEMES).forEach(t=>{
        const cw=THEMES[t].filter(w=>!w.builtin);
        if(cw.length)custom[t]=cw;
      });
      await window.storage.set(STORAGE_KEY,JSON.stringify(custom));
    }
  }catch(e){}
}

function speak(t,rate){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='zh-CN';u.rate=rate||0.85;
  const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith('zh'));
  if(v.length)u.voice=v[0];
  speechSynthesis.speak(u);
}

function themeNav(){
  document.getElementById('themeNav').innerHTML=Object.keys(THEMES).map(t=>
    `<button class="tbtn${t===curTheme?' active':''}" onclick="pickTheme('${t}')">${t}</button>`).join('');
  const sel=document.getElementById('tpTheme');
  sel.innerHTML=Object.keys(THEMES).map(t=>`<option value="${t}">${t}</option>`).join('')+'<option value="__new__">＋ 新建主题…</option>';
  sel.value=curTheme;
}
function pickTheme(t){curTheme=t;cur=0;stopRec();themeNav();wordNav();render();tpList();}
function wordNav(){
  const words=THEMES[curTheme];
  document.getElementById('wordNav').innerHTML=words.map((w,i)=>
    `<div class="wbtn${i===cur?' active':''}" onclick="pick(${i})">
      <span class="we">${w.emoji||'📖'}</span><span class="wt">${w.zh}</span></div>`).join('');
}
function pick(i){cur=i;stopRec();wordNav();render();}

function render(){
  const words=THEMES[curTheme];
  if(!words||!words.length){document.getElementById('mainCard').innerHTML='<div class="big-card" style="text-align:center;color:var(--color-text-secondary)">这个主题还没有词汇，请老师导入吧！</div>';return;}
  const w=words[cur];
  const chars=[...w.zh];
  document.getElementById('mainCard').innerHTML=`
<div class="big-card">
  <div class="hero">
    <div class="hero-emoji">${w.emoji||'📖'}</div>
    <div>
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">

    <div class="ex-zh">${w.ex}</div>
    ${w.exPy?`<div class="ex-py">${w.exPy}</div>`:''}
    <div class="row">
      <button class="cbtn cbtn-blue" onclick="speak('${w.ex}',0.7)"><i class="ti ti-volume" aria-hidden="true"></i> 听例句</button>
      <button class="cbtn cbtn-gray" onclick="speak('${w.ex}',0.5)"><i class="ti ti-snail" aria-hidden="true"></i> 慢慢听</button>
    </div>
  </div>

  <div class="sec sec-rec">
    <div class="sec-title"><i class="ti ti-microphone" aria-hidden="true"></i> 我来读一读 My turn to read!</div>
    <div class="row">
      <button class="cbtn cbtn-pink" id="recBtn" onclick="toggleRec()"><i class="ti ti-microphone" aria-hidden="true"></i> <span id="recLbl">开始录音</span></button>
      <span class="hint" id="recStatus" style="margin-top:0">按下按钮，大声读出「${w.zh}」吧！</span>
    </div>
    <audio id="recAudio" controls style="display:none"></audio>
    <div class="mic-help" id="micHelp">
      <h4><i class="ti ti-alert-circle" aria-hidden="true"></i> 麦克风没有打开？这样设置：</h4>
      <ol>
        <li><b>最快的方法</b>：点浏览器<b>地址栏左边</b>的 🔒 或 ⚙️ 小图标 → 找到「麦克风」→ 选「<b>允许</b>」→ 刷新页面。</li>
        <li><b>Chrome</b>：复制地址粘贴到地址栏打开：<code>chrome://settings/content/microphone</code>
          <button class="copy-link" onclick="copyLink('chrome://settings/content/microphone')"><i class="ti ti-copy" aria-hidden="true"></i> 复制</button></li>
        <li><b>Edge</b>：<code>edge://settings/content/microphone</code>
          <button class="copy-link" onclick="copyLink('edge://settings/content/microphone')"><i class="ti ti-copy" aria-hidden="true"></i> 复制</button></li>
        <li><b>Safari</b>：Safari 菜单 → 设置 → 网站 → 麦克风 → 允许。</li>
        <li><b>手机</b>：手机设置 → 浏览器 App → 权限 → 打开麦克风。</li>
      </ol>
      <div style="font-size:12px;color:#791F1F;margin-top:6px">浏览器为了安全不允许网页直接跳到设置页，需要复制地址自己打开。设置好后回来刷新就能录音啦！</div>

  </div>

    <div class="sec-title"><i class="ti ti-pencil" aria-hidden="true"></i> 看笔顺 Watch the strokes</div>

      ${chars.map((c,i)=>`<div class="char-box"><div class="hw-target" id="demo${i}"></div><div class="char-label">${c}</div></div>`).join('')}

    <div class="sec-title"><i class="ti ti-writing" aria-hidden="true"></i> 我来写一写 Now you write!</div>

      ${chars.map((c,i)=>`<div class="char-box"><div class="quiz-target" id="quiz${i}"></div><div class="quiz-label">写「${c}」</div><div class="progress-dots" id="dots${i}"></div></div>`).join('')}
    </div>
    <div class="row" style="justify-content:center;margin-top:10px">
      <button class="cbtn cbtn-teal" onclick="startQuiz()"><i class="ti ti-pencil-plus" aria-hidden="true"></i> 开始写字</button>
      <button class="cbtn cbtn-gray" onclick="resetQuiz()"><i class="ti ti-refresh" aria-hidden="true"></i> 重新写</button>
    </div>
    <div class="stars" id="starRow" style="text-align:center;margin-top:6px"></div>
    <div class="feedback" id="quizFb"></div>
    <div class="hint" style="text-align:center">一笔一笔慢慢写，笔顺对了才能过关！写错 3 次会出现小提示。</div>

  buildWriters();updateStars();checkMicPermission();

function buildWriters(){
  demoWriters=[];quizWriters=[];
  const w=THEMES[curTheme][cur];
  if(!w)return;
  const chars=[...w.zh];
  const size=Math.min(140,Math.floor((680-60)/chars.length)-18);
  chars.forEach((c,i)=>{
    try{demoWriters.push(HanziWriter.create('demo'+i,c,{width:size,height:size,padding:8,strokeColor:'#534AB7',outlineColor:'#CECBF6',delayBetweenStrokes:280,strokeAnimationSpeed:1}));}catch(e){demoWriters.push(null);}
    try{quizWriters.push(HanziWriter.create('quiz'+i,c,{width:size,height:size,padding:8,showCharacter:false,showOutline:true,outlineColor:'#D7F2E8',strokeColor:'#0F6E56',drawingColor:'#1D9E75',drawingWidth:14,leniency:0.75,showHintAfterMisses:3,highlightOnComplete:true,highlightColor:'#FAC775'}));}catch(e){quizWriters.push(null);}
  });
}

// ── Sequential stroke animation: one character finishes before the next begins ──
function playStrokes(){
  if(strokePlaying)return;
  strokePlaying=true;
  const btn=document.getElementById('strokeBtn');
  if(btn)btn.disabled=true;
  let i=0;
  const boxes=document.querySelectorAll('.hw-target');
  const next=()=>{
    boxes.forEach(b=>b.classList.remove('playing'));
    if(i>=demoWriters.length){
      strokePlaying=false;
      if(btn)btn.disabled=false;
      return;
    }
    const idx=i++;
    const dw=demoWriters[idx];
    if(boxes[idx])boxes[idx].classList.add('playing');
    if(!dw){setTimeout(next,200);return;}
    try{
      dw.animateCharacter({onComplete:()=>setTimeout(next,500)});
    }catch(e){setTimeout(next,200);}
  };
  next();
}

function startQuiz(){
  const w=THEMES[curTheme][cur];
  const chars=[...w.zh];
  quizDone=chars.map(()=>false);
  const fb=document.getElementById('quizFb');
  fb.className='feedback progress';fb.textContent='开始吧！按照笔顺，一笔一笔写。✏️';
  quizWriters.forEach((qw,i)=>{
    if(!qw)return;
    const dotsEl=document.getElementById('dots'+i);
    qw.quiz({leniency:0.75,
      onCorrectStroke:(d)=>{if(dotsEl)dotsEl.innerHTML=Array.from({length:d.strokesRemaining+d.strokeNum+1},(_,k)=>`<span class="pdot${k<=d.strokeNum?' done':''}"></span>`).join('');},
      onMistake:(d)=>{
        const f=document.getElementById('quizFb');
        if(d.mistakesOnStroke===1){f.className='feedback try';f.textContent='哎呀，这一笔不太对，再试试！注意笔画的方向哦。';}
        else if(d.mistakesOnStroke>=3){f.className='feedback progress';f.textContent='没关系！看看出现的小提示，跟着写就可以啦。💪';}
      },
      onComplete:()=>{
        quizDone[i]=true;
        const f=document.getElementById('quizFb');
        if(quizDone.every(x=>x)){
          f.className='feedback good';
          f.textContent='🎉 太棒了！你写对了「'+w.zh+'」！获得一颗星星 ⭐';
          starsEarned[w.zh]=(starsEarned[w.zh]||0)+1;
          updateStars();speak('太棒了！');
        }else{f.className='feedback progress';f.textContent='很好！这个字写对啦，继续写下一个字！';}
      }
    });
  });
}
function resetQuiz(){
  buildWriters();
  const fb=document.getElementById('quizFb');
  fb.className='feedback';fb.style.display='none';
  const w=THEMES[curTheme][cur];
  [...w.zh].forEach((_,i)=>{const d=document.getElementById('dots'+i);if(d)d.innerHTML='';});
}
function updateStars(){
  const w=THEMES[curTheme][cur];
  if(!w)return;
  const n=starsEarned[w.zh]||0;
  const el=document.getElementById('starRow');
  if(el)el.textContent=n>0?'⭐'.repeat(Math.min(n,10))+`  （你已经写对 ${n} 次啦！）`:'';
}

async function checkMicPermission(){
  try{
    if(navigator.permissions&&navigator.permissions.query){
      const st=await navigator.permissions.query({name:'microphone'});
      const help=document.getElementById('micHelp');
      if(st.state==='denied'&&help)help.classList.add('show');
      st.onchange=()=>{const h=document.getElementById('micHelp');if(h){if(st.state==='denied')h.classList.add('show');else h.classList.remove('show');}};
    }
  }catch(e){}
}
function copyLink(url){
  try{navigator.clipboard.writeText(url).then(()=>{const s=document.getElementById('recStatus');if(s)s.textContent='地址已复制！粘贴到浏览器地址栏打开即可。';});}
  catch(e){const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
}

async function toggleRec(){
  if(isRec){stopRec();return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    document.getElementById('micHelp').classList.remove('show');
    chunks=[];
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>chunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(chunks,{type:'audio/webm'});
      const a=document.getElementById('recAudio');
      if(a){a.src=URL.createObjectURL(blob);a.style.display='block';}
      const s=document.getElementById('recStatus');
      if(s)s.textContent='录好啦！点播放听听自己的声音 🎧';
      stream.getTracks().forEach(t=>t.stop());
    };
    mediaRecorder.start();isRec=true;
    const b=document.getElementById('recBtn');
    if(b){b.classList.add('recording');document.getElementById('recLbl').textContent='停止录音';}
    const s=document.getElementById('recStatus');
    if(s)s.textContent='🔴 正在录音……大声读「'+THEMES[curTheme][cur].zh+'」！';
  }catch(e){
    const s=document.getElementById('recStatus');
    const help=document.getElementById('micHelp');
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      if(s)s.textContent='麦克风权限被拒绝了，请看下面的设置方法 👇';
      if(help)help.classList.add('show');
    }else if(e.name==='NotFoundError'){
      if(s)s.textContent='没有找到麦克风设备，请检查是否连接了麦克风。';
    }else{
      if(s)s.textContent='麦克风打不开，请看下面的设置方法 👇';
      if(help)help.classList.add('show');
    }
  }
}
function stopRec(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  isRec=false;
  const b=document.getElementById('recBtn');
  if(b){b.classList.remove('recording');const l=document.getElementById('recLbl');if(l)l.textContent='开始录音';}
}

function toggleTeacher(){document.getElementById('teacherPanel').classList.toggle('show');tpList();}
function tpThemeChange(){
  const v=document.getElementById('tpTheme').value;
  document.getElementById('tpNewTheme').style.display=v==='__new__'?'block':'none';
  tpList();
}
function tpList(){
  const el=document.getElementById('tpWordList');
  if(!el)return;
  const sel=document.getElementById('tpTheme').value;
  const theme=sel==='__new__'?null:sel;
  const words=theme?(THEMES[theme]||[]):[];
  el.innerHTML=words.map((w,i)=>
    `<span class="tp-word-chip">${w.emoji||'📖'} ${w.zh}${!w.builtin?` <button onclick="delWord('${theme}',${i})" aria-label="删除">×</button>`:''}</span>`).join('')||'<span style="font-size:12px;color:#854F0B">（暂无词汇）</span>';
}
async function delWord(theme,i){
  if(THEMES[theme][i].builtin)return;
  THEMES[theme].splice(i,1);
  if(!THEMES[theme].length&&theme!=='情绪'&&theme!=='课程')delete THEMES[theme];
  if(!THEMES[curTheme]){curTheme='情绪';cur=0;}
  if(cur>=THEMES[curTheme].length)cur=0;
  await persist();
  themeNav();wordNav();render();tpList();
}

// ── AI auto-generation: teacher only types Chinese words ──
async function generateWords(){
  const msg=document.getElementById('tpMsg');
  const spin=document.getElementById('genSpin');
  const btn=document.getElementById('genBtn');
  const sel=document.getElementById('tpTheme').value;
  let theme=sel;
  if(sel==='__new__'){
    theme=document.getElementById('tpNewTheme').value.trim();
    if(!theme){msg.className='tp-msg err';msg.textContent='请先输入新主题名称。';return;}
  }
  const raw=document.getElementById('tpWords').value.trim();
  if(!raw){msg.className='tp-msg err';msg.textContent='请先输入中文词语。';return;}
  let words=raw.split(/[,，、\s\n]+/).map(w=>w.trim()).filter(w=>w);
  const invalid=words.filter(w=>!/^[\u4e00-\u9fff]+$/.test(w));
  if(invalid.length){msg.className='tp-msg err';msg.textContent='这些不是汉字词语，请检查：'+invalid.join('、');return;}
  const existing=THEMES[theme]?THEMES[theme].map(w=>w.zh):[];
  const dup=words.filter(w=>existing.includes(w));
  words=words.filter(w=>!existing.includes(w));
  if(!words.length){msg.className='tp-msg warn';msg.textContent='这些词都已经在主题里了：'+dup.join('、');return;}
  if(words.length>8){msg.className='tp-msg warn';msg.textContent='一次最多 8 个词，本次只处理前 8 个。';words=words.slice(0,8);}

  btn.disabled=true;
  spin.classList.add('show');
  document.getElementById('genSpinTxt').textContent='AI 正在为 '+words.length+' 个词生成拼音、翻译、解释和例句……';
  msg.className='tp-msg';msg.style.display='none';

  try{
    const response=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        messages:[{role:"user",content:
`为以下中文词语生成小学生中文学习卡片数据。词语：${words.join('、')}

要求：
1. py: 拼音（带声调，音节间用空格）
2. en: 英语翻译（简短）
3. de: 德语翻译（简短）
4. defZh: 中文解释（一句话，小学生能懂的简单语言）
5. defEn: 英文解释（一句话，简单英语）
6. ex: 中文例句（简短，适合小学生，语法正确）
7. exPy: 例句的拼音
8. emoji: 一个最能代表这个词的emoji

只返回JSON数组，不要任何其他文字、不要markdown代码块。格式：
[{"zh":"词","py":"...","en":"...","de":"...","defZh":"...","defEn":"...","ex":"...","exPy":"...","emoji":"..."}]`}]
      })
    });
    const data=await response.json();
    let text=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('').trim();
    text=text.replace(/```json|```/g,'').trim();
    const start=text.indexOf('[');const end=text.lastIndexOf(']');
    if(start===-1||end===-1)throw new Error('格式错误');
    const items=JSON.parse(text.slice(start,end+1));
    if(!Array.isArray(items)||!items.length)throw new Error('没有生成结果');

    if(!THEMES[theme])THEMES[theme]=[];
    let added=0;
    items.forEach(it=>{
      if(!it.zh||!it.py||THEMES[theme].some(w=>w.zh===it.zh))return;
      THEMES[theme].push({zh:it.zh,py:it.py,en:it.en||'',de:it.de||'',defZh:it.defZh||'',defEn:it.defEn||'',ex:it.ex||'',exPy:it.exPy||'',emoji:it.emoji||AUTO_EMOJI[THEMES[theme].length%AUTO_EMOJI.length],builtin:false});
      added++;
    });
    await persist();
    msg.className='tp-msg ok';
    msg.textContent='✓ AI 已生成并导入 '+added+' 个词到主题「'+theme+'」！'+(dup.length?' （'+dup.join('、')+' 已存在，跳过）':'')+' 笔顺自动加载完成。';
    document.getElementById('tpWords').value='';
    if(added){curTheme=theme;cur=THEMES[theme].length-added;themeNav();wordNav();render();tpList();}
  }catch(e){
    msg.className='tp-msg err';
    msg.textContent='生成失败了，请稍后再试一次。（'+(e.message||'网络错误')+'）';
  }finally{
    btn.disabled=false;
    spin.classList.remove('show');
  }
}

themeNav();wordNav();render();loadSaved();
